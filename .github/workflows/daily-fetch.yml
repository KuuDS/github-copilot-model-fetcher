name: Daily Copilot Models Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -e ".[dev]"

    - name: Install GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y
        gh --version

    - name: Fetch Copilot models
      id: fetch
      env:
        COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
        OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        PYTHONUNBUFFERED: "1"
      run: |
        python -m copilot_fetcher fetch

        MODEL_COUNT=$(python3 -c "import json, os; d=json.load(open(os.path.expanduser('~/.copilot-fetcher/models.json'))); print(d.get('total', len(d.get('data', []))))" 2>/dev/null || echo "0")
        echo "count=$MODEL_COUNT" >> $GITHUB_OUTPUT

        # Print model list to logs
        echo ""
        echo "=== Fetched Models ==="
        python -m copilot_fetcher list
        echo "======================"

    - name: Generate LiteLLM configs
      if: success()
      run: |
        python -m copilot_fetcher litellm-config \
          --output ~/.copilot-fetcher/litellm-config.yaml
        python -m copilot_fetcher litellm-config --format json \
          --output ~/.copilot-fetcher/litellm-config.json
        echo "Generated LiteLLM configs"

    - name: Commit to release branch
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Export model files to temp directory
        mkdir -p /tmp/models-export
        cp ~/.copilot-fetcher/models.json /tmp/models-export/copilot-models.json
        cp ~/.copilot-fetcher/litellm-config.yaml /tmp/models-export/litellm-config.yaml
        cp ~/.copilot-fetcher/litellm-config.json /tmp/models-export/litellm-config.json

        # Work in a temp directory to avoid polluting the main checkout
        cd /tmp
        REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        if git ls-remote --heads "$REPO_URL" release | grep -q "refs/heads/release"; then
          # release branch exists: clone and remove all tracked files
          git clone --depth 1 --branch release "$REPO_URL" release-temp
          cd release-temp
          git rm -rf .
        else
          # create fresh orphan branch
          git init release-temp
          cd release-temp
          git remote add origin "$REPO_URL"
          git checkout --orphan release
        fi

        # Clean everything except the .git directory
        find . -mindepth 1 -not -path './.git/*' -not -path './.git' -exec rm -rf {} + 2>/dev/null || true

        # Add model files
        mkdir -p models
        cp /tmp/models-export/* models/

        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        git add models/
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Copilot models - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin release
        fi

        # Create and push tag from the release branch
        TAG="v$(date +%Y-%m-%d-%H%M%S)"
        git tag "$TAG"
        git push origin "$TAG"
        echo "Created tag: $TAG"

    - name: Workflow Summary
      if: always()
      run: |
        echo "## Copilot Models Fetch Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ steps.fetch.outcome }}" == "success" ]; then
          echo "Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Models fetched: ${{ steps.fetch.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Config files: litellm-config.yaml, litellm-config.json" >> $GITHUB_STEP_SUMMARY
        else
          echo "Fetch Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "A notification issue has been created. Please check the Issues tab." >> $GITHUB_STEP_SUMMARY
          else
            echo "Manual trigger failed. Check the logs for device flow instructions." >> $GITHUB_STEP_SUMMARY
          fi
        fi
