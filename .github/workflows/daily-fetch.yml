name: Daily Copilot Models Fetch

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -e .
    
    - name: Install GitHub CLI
      run: |
        # Install GitHub CLI on Ubuntu
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y
        gh --version
    
    - name: Authenticate GitHub CLI
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        # Authenticate gh CLI using the token
        echo "$GH_TOKEN" | gh auth login --with-token
        gh auth status
    
    - name: Fetch Copilot models
      run: |
        # Use gh CLI to get token and fetch models
        python -m copilot_fetcher fetch
    
    - name: Copy models to repository
      run: |
        mkdir -p models
        cp ~/.copilot-fetcher/models.json models/copilot-models.json
        cp ~/.copilot-fetcher/models.json models/copilot-models-$(date +%Y-%m-%d).json
    
    - name: Create or update release branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Fetch all branches
        git fetch origin
        
        # Check if release branch exists
        if git show-ref --verify --quiet refs/remotes/origin/release; then
          # Checkout existing release branch
          git checkout release
          git pull origin release
        else
          # Create new release branch from main
          git checkout -b release
        fi
        
        # Add and commit models
        git add models/
        
        # Only commit if there are changes
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Copilot models - $(date +%Y-%m-%d %H:%M:%S UTC)"
          git push origin release
        fi
    
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATE=$(date +%Y-%m-%d)
        
        # Check if release already exists
        if gh release view "v$DATE" &>/dev/null; then
          echo "Release v$DATE already exists, updating..."
          gh release upload "v$DATE" models/copilot-models.json --clobber
        else
          # Create new release
          gh release create "v$DATE" \
            --title "Copilot Models - $DATE" \
            --notes "Daily snapshot of GitHub Copilot available models" \
            models/copilot-models.json \
            models/copilot-models-$DATE.json
        fi
